name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          ENABLE_CONTENT_SYNC: false
          BILI_SESSDATA: ${{ secrets.BILI_SESSDATA }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Feishu
        if: ${{ success() }}
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_RECEIVER_EMAIL: 774659391@qq.com
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          token_response="$(curl --silent --show-error --fail-with-body \
            --request POST \
            --header 'Content-Type: application/json; charset=utf-8' \
            --data "{\"app_id\":\"${FEISHU_APP_ID}\",\"app_secret\":\"${FEISHU_APP_SECRET}\"}" \
            https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal)"

          tenant_access_token="$(TOKEN_RESPONSE="$token_response" python3 -c 'import json, os, sys; data = json.loads(os.environ["TOKEN_RESPONSE"]); code = data.get("code"); 0 if code == 0 else (print(data, file=sys.stderr), (_ for _ in ()).throw(SystemExit("Failed to get Feishu tenant_access_token"))); print(data["tenant_access_token"])')"

          message_payload="$(python3 -c 'import json, os; commit_message = os.environ.get("COMMIT_MESSAGE", "").strip() or "workflow_dispatch"; run_url = os.environ["SERVER_URL"] + "/" + os.environ["REPOSITORY"] + "/actions/runs/" + os.environ["RUN_ID"]; page_url = os.environ.get("PAGE_URL", "").strip() or "(page URL unavailable)"; text = "\n".join(["GitHub Pages deploy succeeded", "Repo: " + os.environ["REPOSITORY"], "Branch: " + os.environ["REF_NAME"], "SHA: " + os.environ["SHA"][:7], "Actor: " + os.environ["ACTOR"], "Commit: " + commit_message, "Pages: " + page_url, "Run: " + run_url]); print(json.dumps({"receive_id": os.environ["FEISHU_RECEIVER_EMAIL"], "msg_type": "text", "content": json.dumps({"text": text}, ensure_ascii=False)}, ensure_ascii=False))')"

          send_response="$(curl --silent --show-error --fail-with-body \
            --request POST \
            --header "Authorization: Bearer ${tenant_access_token}" \
            --header 'Content-Type: application/json; charset=utf-8' \
            --data "$message_payload" \
            'https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=email')"

          SEND_RESPONSE="$send_response" python3 -c 'import json, os, sys; data = json.loads(os.environ["SEND_RESPONSE"]); code = data.get("code"); 0 if code == 0 else (print(data, file=sys.stderr), (_ for _ in ()).throw(SystemExit("Failed to send Feishu notification")))'
